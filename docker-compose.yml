services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./spacenews.db:/app/spacenews.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./spacenews.db:/app/spacenews.db
    command: python scheduler.py
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
